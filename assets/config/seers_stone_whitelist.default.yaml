# ============================================================================
#  Seer's Stone — wisp-eligibility whitelist  (SBPR Trailborne)
# ----------------------------------------------------------------------------
#  This file controls WHICH things glow with a wisp when you wear the Seer's
#  Stone. It ships pre-packaged with the full VANILLA roster below — but it is
#  YOURS to edit. Server owners & modpack authors: add or remove lines freely.
#
#  HOW IT WORKS
#   - List the PREFAB NAME of anything that should glow (one per line, under a
#     section). The runtime '(Clone)' suffix is handled for you — write the
#     base name (e.g. 'RaspberryBush', not 'RaspberryBush(Clone)').
#   - IGNORE-UNLISTED: anything NOT listed here gets NO wisp. That's the design —
#     this file is the allow-list. To make a modded berry/ore/POI glow, add its
#     prefab name to the matching section below.
#   - Lines starting with '#' are comments. Blank lines are ignored.
#   - The three sections are organizational only; eligibility is their UNION.
#
#  WHAT'S DELIBERATELY EXCLUDED (by design, Daniel 2026-06-25)
#   - World-floor litter: stone, wood/branch, flint (too common to mean anything).
#   - Creatures (deer/boar/etc.) — the stone reveals places & forage, not hunting.
#   - BURIED silver veins — a wisp there would replace the Wishbone's whole job,
#     and a wisp can't ride a buried object's bounds. Surface ore IS included.
#
#  To restore the shipped defaults: delete this file and restart — it re-seeds.
# ============================================================================

# Schema version — do not edit; lets the mod migrate the format if it ever changes.
version: 1

# ── PICKABLES ───────────────────────────────────────────────────────────────
# Clustered forage & high-value pick-ups. Patch-forming bushes glow over the
# whole patch; the wisp persists while the plant exists, even after harvest.
pickables:
  - RaspberryBush                   # Meadows — raspberries
  - BlueberryBush                   # Black Forest — blueberries
  - CloudberryBush                  # Plains — cloudberries
  - Pickable_Mushroom               # Meadows/BF/Swamp — mushroom
  - Pickable_Mushroom_yellow        # BF caves — yellow mushroom
  - Pickable_Mushroom_blue          # Swamp — blue mushroom
  - Pickable_Mushroom_Magecap       # Mistlands — magecap
  - Pickable_Mushroom_JotunPuffs    # Mistlands — jotun puffs
  - Pickable_Dandelion              # Meadows — dandelion
  - Pickable_Thistle                # BF/Swamp — thistle
  - Pickable_Fiddlehead             # Ashlands — fiddlehead
  - Pickable_Carrot                 # cultivated — wild carrot (rare natural)
  - Pickable_Turnip                 # Swamp — wild turnip clusters
  - Pickable_SeedCarrot             # Black Forest — carrot seeds
  - Pickable_SeedTurnip             # Swamp — turnip seeds
  - Pickable_SeedOnion              # Mountain — onion seeds (in chests/ruins)
  - Pickable_Barley_Wild            # Plains — wild barley (Fuling villages)
  - Pickable_Flax_Wild              # Plains — wild flax (Fuling villages)
  - Pickable_RoyalJelly             # Mistlands — royal jelly
  - Pickable_DragonEgg              # Mountain — dragon egg (high value)

# ── SURFACE ORE ─────────────────────────────────────────────────────────────
# Pickable ore + ABOVE-GROUND mine deposits (copper boulders, tin/obsidian).
# Buried silver veins are intentionally absent (see header).
ore_surface:
  - Pickable_Tin                    # Black Forest — tin (small pickable)
  - Pickable_Obsidian               # Mountain — obsidian (pickable)
  - Pickable_BogIronOre             # Swamp — bog iron (pickable)
  - Pickable_SulfurRock             # Ashlands — sulfur (pickable)
  - Pickable_MountainCaveCrystal    # Mountain caves — crystal
  - Pickable_Meteorite              # Ashlands — meteorite shard (glowing metal)
  - MineRock_Tin                    # Black Forest — tin deposit (surface MineRock)
  - MineRock_Copper                 # Black Forest — copper deposit (surface MineRock)
  - MineRock_Obsidian               # Mountain — obsidian deposit (surface MineRock)

